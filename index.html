<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>elbdrop MoveMents</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#252525;
  --border:#2a2a2a;--border2:#333;
  --text:#f0f0f0;--t2:#a0a0a0;--t3:#666;
  --gold:#c9a84c;--gold2:#e8c97a;
  --gbg:rgba(201,168,76,.08);--gbg2:rgba(201,168,76,.15);
  --red:#e24b4a;--green:#1d9e75;--warn:#ef9f27;
  --r:10px;--rl:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
#root{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg2);display:flex;flex-direction:column}

/* HEADER */
.hdr{padding:13px 18px 10px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:sticky;top:0;z-index:50}
.logo{font-size:13px;font-weight:700;letter-spacing:.1em;color:var(--gold);text-transform:uppercase}
.logo em{color:var(--t2);font-style:normal;font-weight:400}
.role-tag{font-size:11px;color:var(--t3);background:var(--bg3);padding:3px 8px;border-radius:20px;border:.5px solid var(--border2)}
.role-tag.admin{color:var(--gold2);background:var(--gbg2);border-color:rgba(201,168,76,.3)}

/* CONTENT */
.page{flex:1;overflow-y:auto;padding-bottom:80px;display:none}
.page.active{display:block}
.sec{padding:14px 18px}
.stitle{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-top:.5px solid var(--border);display:flex;padding:6px 0 14px;z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--t3);font-size:9px;font-weight:500;border:none;background:none;cursor:pointer}
.ni.on{color:var(--gold)}
.ni svg{width:20px;height:20px;stroke-width:1.5;fill:none;stroke:currentColor}

/* LOGIN */
#pg-login{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;background:var(--bg);min-height:100vh}
.login-title{font-size:24px;font-weight:700;letter-spacing:.14em;color:var(--gold);text-transform:uppercase}
.login-sub{font-size:11px;color:var(--t3);letter-spacing:.18em;text-transform:uppercase;margin-top:4px;margin-bottom:36px}
.login-form{width:100%;max-width:320px;display:flex;flex-direction:column;gap:13px}
.lerr{color:var(--red);font-size:12px;text-align:center;padding:8px;background:rgba(226,75,74,.08);border-radius:var(--r);display:none}

/* FORMS */
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:10px;color:var(--t2);font-weight:500;text-transform:uppercase;letter-spacing:.07em}
.fi{background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--r);padding:10px 13px;color:var(--text);font-size:13px;outline:none;width:100%;transition:border-color .15s}
.fi:focus{border-color:var(--gold)}
.fi[readonly]{opacity:.55}
.fsel{background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--r);padding:10px 13px;color:var(--text);font-size:13px;outline:none;width:100%}
.fta{background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--r);padding:10px 13px;color:var(--text);font-size:13px;outline:none;resize:vertical;width:100%;min-height:64px}

/* BUTTONS */
.btn{border:none;border-radius:var(--r);padding:11px;font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:opacity .15s}
.btn:hover{opacity:.9}
.btn-gold{background:var(--gold);color:#000}
.btn-green{background:var(--green);color:#fff}
.btn-outline{background:transparent;color:var(--t2);border:.5px solid var(--border2)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:rgba(226,75,74,.1);color:var(--red);border:.5px solid rgba(226,75,74,.3)}
.btn-sm{padding:6px 12px;font-size:11px;font-weight:500;border-radius:8px;cursor:pointer;border:none;flex:1}
.btn-sm:hover{opacity:.85}

/* CARDS */
.card{background:var(--bg3);border:.5px solid var(--border);border-radius:var(--rl);padding:13px 15px;margin-bottom:9px}
.card.cp{cursor:pointer;transition:border-color .15s}
.card.cp:hover{border-color:var(--border2)}
.crow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ct{font-size:13px;font-weight:500;color:var(--text)}
.cs{font-size:11px;color:var(--t2);margin-top:2px}
.dvd{height:.5px;background:var(--border);margin:10px 0}

/* BADGES */
.bdg{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.b-new{background:rgba(52,120,220,.15);color:#6baeed}
.b-pend{background:rgba(239,159,39,.15);color:var(--warn)}
.b-done{background:rgba(29,158,117,.12);color:var(--green)}
.b-gold{background:var(--gbg);color:var(--gold2)}
.b-red{background:rgba(226,75,74,.12);color:var(--red)}

/* AMOUNT ROWS */
.amr{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:.5px solid var(--border)}
.amr:last-child{border-bottom:none}
.aml{font-size:12px;color:var(--t2)}
.amv{font-size:12px;font-weight:500;color:var(--gold);text-align:right}

/* TABS */
.tabs{display:flex;border-bottom:.5px solid var(--border);overflow-x:auto}
.tab{padding:10px 14px;font-size:12px;font-weight:500;color:var(--t3);border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;cursor:pointer}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* DETAIL HEADER */
.dhdr{padding:13px 18px;display:flex;align-items:center;gap:12px;border-bottom:.5px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10}
.back{background:none;border:none;color:var(--gold);cursor:pointer;font-size:13px;font-weight:500}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mov.open{display:flex}
.mod{background:var(--bg3);border-radius:var(--rl) var(--rl) 0 0;padding:20px 18px 28px;width:100%;max-width:430px;border-top:.5px solid var(--border2);max-height:88vh;overflow-y:auto}
.mod-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mod-hdr h3{font-size:15px;font-weight:500}
.mclose{background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;line-height:1}

/* PROFILE */
.ava{width:56px;height:56px;border-radius:50%;background:var(--gbg2);border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:var(--gold);margin:0 auto 10px}

/* UPLOAD ZONE */
.upzone{background:var(--bg3);border:.5px dashed var(--border2);border-radius:var(--r);padding:13px;text-align:center;cursor:pointer;margin-bottom:8px;transition:border-color .15s}
.upzone:hover{border-color:var(--gold)}

/* CONTRACT */
.ctxt{font-size:11px;color:var(--t2);line-height:1.75;max-height:200px;overflow-y:auto;padding:12px;background:var(--bg4);border-radius:8px;margin:10px 0;white-space:pre-wrap}
.sigpad{background:var(--bg4);border:.5px solid var(--border2);border-radius:var(--r);height:80px;position:relative;cursor:crosshair;margin:8px 0}
.sigpad canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:var(--r)}
.siglbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--t3);pointer-events:none}

/* PROGRESS */
.ptr{height:3px;background:var(--bg4);border-radius:3px;overflow:hidden;margin:6px 0}
.pb{height:100%;background:var(--gold);border-radius:3px}
.plbl{display:flex;justify-content:space-between;font-size:9px;color:var(--t3)}

/* ROUTE */
.route-up{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:3px}
.route-dn{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:3px}
.route-line{width:1px;height:12px;background:var(--border2);margin:2px 0 2px 3.5px}

/* FLIGHT INFO BOX */
.fbox{background:var(--gbg);border-radius:8px;padding:8px 10px;margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:4px}
.fbox-lbl{font-size:9px;color:var(--t3);text-transform:uppercase}
.fbox-val{font-size:12px;font-weight:500;color:var(--text)}

/* TIME */
.tbig{font-size:40px;font-weight:300;color:var(--gold);letter-spacing:.06em;font-variant-numeric:tabular-nums;text-align:center}
.tstat{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px}
.ts-on{background:rgba(29,158,117,.12);color:var(--green)}
.ts-off{background:var(--bg3);color:var(--t3)}

/* SCAN BTN */
.sbtn{background:var(--gbg2);border:1px dashed var(--gold);border-radius:var(--rl);padding:22px;text-align:center;cursor:pointer;width:100%}

/* CONFIRM NOTE */
.cnote{background:rgba(29,158,117,.06);border-left:2px solid var(--green);padding:7px 10px;border-radius:0 6px 6px 0;font-size:11px;color:var(--t2);line-height:1.6;margin-top:8px}

/* WARN BOX */
.wbox{background:rgba(239,159,39,.08);border:.5px solid rgba(239,159,39,.3);border-radius:var(--r);padding:8px 12px;font-size:11px;color:var(--warn);margin-bottom:8px}

/* DRIVER CHIP */
.dchip{display:inline-flex;align-items:center;gap:5px;background:var(--gbg2);border:.5px solid rgba(201,168,76,.3);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--gold2);margin:2px}
.dava{width:20px;height:20px;border-radius:50%;background:var(--gbg);border:1px solid var(--gold);display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:var(--gold)}

#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#1e1e1e;border:.5px solid var(--gold);color:var(--gold2);padding:9px 16px;border-radius:30px;font-size:12px;z-index:999;display:none;white-space:nowrap;pointer-events:none}
</style>
</head>

}

function eur(v){return(+v||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
function fmtMin(m){return Math.floor(m/60)+'h '+String(m%60).padStart(2,'0')+'min';}
function fmtT(d){return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fmtDate(s){if(!s)return'–';const d=new Date(s);return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtDateShort(s){if(!s)return'–';const d=new Date(s);return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2800);}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function rndStart(d){const m=d.getMinutes();const b=Math.floor(m/15)*15-15;const nd=new Date(d);if(b<0){nd.setHours(nd.getHours()-1,45,0,0);}else{nd.setMinutes(b,0,0);}return nd;}
function rndEnd(d){const m=d.getMinutes(),s=d.getSeconds();if(s===0&&m%15===0)return d;const t=[0,15,30,45];const rm=t.find(x=>x>m);const nd=new Date(d);if(rm===undefined){nd.setHours(nd.getHours()+1,0,0,0);}else{nd.setMinutes(rm,0,0);}return nd;}
function driverName(id){const d=drivers.find(x=>x.email===id);return d?d.name:id||'–';}
function driverIni(id){const d=drivers.find(x=>x.email===id);return d?d.ini:'?';}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const p=document.getElementById(id);if(p)p.classList.add('active');
}
function setNavActive(tab){
  document.querySelectorAll('.ni').forEach(n=>n.classList.toggle('on',n.dataset.tab===tab));
  activeTab=tab;
}

document.getElementById('lbtn').onclick=doLogin;
document.getElementById('lpwd').onkeydown=e=>{if(e.key==='Enter')doLogin();};

function doLogin(){
  const em=document.getElementById('lemail').value.trim().toLowerCase();
  const pw=document.getElementById('lpwd').value;
  const u=USERS[em];
  const err=document.getElementById('lerr');
  if(!u||u.pwd!==pw){err.style.display='block';return;}
  err.style.display='none';
  CU={...u,email:em};
  document.getElementById('pg-login').style.display='none';
  document.getElementById('root').style.display='flex';
  document.getElementById('roleTag').textContent=CU.role==='admin'?'Admin':'Fahrer';
  document.getElementById('roleTag').className='role-tag'+(CU.role==='admin'?' admin':'');
  buildNav();
  if(CU.role==='admin') goAdmin('events');
  else goDriver('overview');
  startClock();
}
function doLogout(){
  CU=null;svcRunning=false;svcStart=null;
  if(clockInt){clearInterval(clockInt);clockInt=null;}
  document.getElementById('root').style.display='none';
  document.getElementById('pg-login').style.display='flex';
  document.getElementById('lemail').value='';
  document.getElementById('lpwd').value='';
}

function badge(cls,txt){return`<span class="bdg ${cls}">${txt}</span>`;}
function statusBadge(s){
  const m={open:['b-red','Kein Fahrer'],sent:['b-pend','Anfrage gesendet'],confirmed:['b-done','Bestätigt'],done:['b-done','Abgeschlossen'],pending:['b-pend','Ausstehend'],accepted:['b-done','Angenommen'],declined:['b-red','Abgelehnt']};
  const d=m[s]||['b-gold',s];return badge(d[0],d[1]);
}

  </div>`;

function updateVerpfPreview(){
  const d=parseInt(document.getElementById('ne-days')?.value)||1;
  const vAnr=document.getElementById('ne-vanr')?.checked||false;
  const vAbr=document.getElementById('ne-vabr')?.checked||false;
  const total=calcVerpf(d,vAnr,vAbr);
  const disp=document.getElementById('ne-days-display');
  const tot=document.getElementById('ne-verpf-total');
  const prev=document.getElementById('ne-verpf-preview');
  if(disp)disp.textContent=d;
  if(tot)tot.textContent=eur(d*28);
  if(prev){
    let parts=[`${d} Einsatztag${d>1?'e':''} × 28,00 € = ${eur(d*28)}`];
    if(vAnr)parts.push('Anreisetag: +14,00 €');
    if(vAbr)parts.push('Abreisetag: +14,00 €');
    parts.push(`Gesamt Verpflegung: ${eur(total)}`);
    prev.innerHTML=parts.join('<br>');
  }
}
function saveNewEvent(editId){
  const title=document.getElementById('ne-title').value.trim();
  if(!title){toast('Bitte Eventname eingeben');return;}
  const days=parseInt(document.getElementById('ne-days').value)||1;
  const sel=document.querySelector('input[name="ne-driver"]:checked');
  const dId=sel?sel.value||null:null;
  const obj={
    title,days,
    dateFrom:document.getElementById('ne-from').value,
    dateTo:document.getElementById('ne-to').value,
    extra:parseFloat(document.getElementById('ne-extra').value)||0,
    pickup:document.getElementById('ne-pickup').value,
    dropoff:document.getElementById('ne-dropoff').value,
    client:document.getElementById('ne-client').value,
    details:document.getElementById('ne-details').value,
    vAnr:document.getElementById('ne-vanr').checked,
    vAbr:document.getElementById('ne-vabr').checked,
    anr:parseFloat(document.getElementById('ne-anr').value)||0,
    abr:parseFloat(document.getElementById('ne-abr').value)||0,
    driverId:dId,
    status:dId?'sent':'open',
    driverStatus:dId?'pending':null
  };
  if(editId){Object.assign(events.find(x=>x.id===editId),obj);}
  else{obj.id=Date.now();events.push(obj);}
  toast(editId?'✓ Event aktualisiert':'✓ Event erstellt · Anfrage gesendet');
  goAdmin('events');
}

      </div>

function timeAction(type){
  const now=new Date();
  if(type==='start'&&!svcRunning){
    svcRunning=true;svcStart=now;
    const rs=rndStart(new Date(now));
    document.getElementById('tstat').className='tstat ts-on';
    document.getElementById('tstat').textContent='Dienst aktiv · Abrechnung ab '+fmtT(rs)+' Uhr';
    document.getElementById('btnS').disabled=true;document.getElementById('btnS').style.opacity='0.4';
    toast('Dienst gestartet · Abrechnung ab '+fmtT(rs)+' Uhr');
  } else if(type==='end'&&svcRunning){
    svcRunning=false;
    const rs=rndStart(new Date(svcStart)),re=rndEnd(new Date(now));
    const min=Math.round((re-rs)/60000);
    const today=now.toISOString().split('T')[0];
    timeEntries.unshift({id:Date.now(),driverId:CU.email,date:today,start:fmtT(rs),end:fmtT(re),astart:fmtT(svcStart),aend:fmtT(now),min,adminStatus:'pending',driverStatus:'submitted'});
    renderTimes();toast('Dienst beendet · '+fmtT(rs)+' – '+fmtT(re));
  }
}
function driverConfirmTime(id){
  const e=timeEntries.find(x=>x.id===id);if(e)e.driverStatus='confirmed';
  renderTimes();toast('✓ Zeiteintrag von dir bestätigt');
}
function startClock(){
  if(clockInt)clearInterval(clockInt);
  clockInt=setInterval(()=>{
    const n=new Date();
    const el=document.getElementById('clk');
    const del=document.getElementById('clkDate');
    if(el)el.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
    if(del)del.textContent=n.toLocaleDateString('de-DE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  },1000);
}

      <div class="amr"><span class="aml" style="font-weight:500;color:var(--text)">Rechnungsbetrag</span><span style="font-size:20px;font-weight:500;color:var(--gold)">${eur(rechnungstotal)}</span></div>
      <div style="margin-top:8px;font-size:11px;color:var(--t2);line-height:1.6">Grundlage für die Rechnungsstellung an elbdrop MoveMents. Bitte Rechnungsnummer, Steuer-ID und IBAN angeben.</div>
    </div>
    <div style="display:flex;gap:9px;margin-bottom:10px">
      <button class="btn btn-outline" onclick="goDriver('billing')">← Zurück</button>
      <button class="btn btn-gold" style="flex:2" onclick="dlBillingPDF(${b.id})">⬇ Abrechnung als PDF</button>
    </div>
    <button class="btn btn-green" onclick="beauftragen(${b.id})">✓ Beauftragen</button>
  </div>`;
  showPage('pg-billing-detail');
}
function beauftragen(id){
  const b=billingItems.find(x=>x.id===id);if(!b)return;
  if(b.status==='paid'){toast('Bereits abgerechnet');return;}
  b.status=b.status==='ready'?'processing':'paid';
  goDriver('billing');toast(b.status==='processing'?'✓ In Bearbeitung gesetzt':'✓ Als bezahlt markiert');
}
function dlBillingPDF(id){
  const b=billingItems.find(x=>x.id===id);if(!b)return;
  const ev=events.find(e=>e.id===b.eventId)||{};
  const c=calcEvent(ev);
  const myR=receipts.filter(r=>r.eventId===b.eventId&&r.driverId===CU.email);
  const auslagen=myR.reduce((s,r)=>s+r.amt,0);
  const netto19=c.total;const mwst=netto19*.19;const brutto19=netto19+mwst;const total=brutto19+auslagen;
  const {jsPDF}=window.jspdf;const doc=new jsPDF();
  doc.setFont('helvetica','bold');doc.setFontSize(18);doc.setTextColor(201,168,76);
  doc.text('elbdrop MoveMents',20,22);
  doc.setFontSize(11);doc.setTextColor(100,100,100);doc.setFont('helvetica','normal');
  doc.text('Abrechnungsübersicht',20,30);doc.setDrawColor(200,200,200);doc.line(20,35,190,35);
  doc.setFontSize(13);doc.setTextColor(30,30,30);doc.setFont('helvetica','bold');doc.text(b.event,20,44);
  let y=56;
  doc.setFontSize(11);doc.setTextColor(100,100,100);doc.setFont('helvetica','bold');doc.text('Zeitübersicht',20,y);y+=8;
  doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
  doc.text('Einsatztage:',20,y);doc.text(String(ev.days||0)+' Tag'+((ev.days||0)>1?'e':''),120,y);y+=7;
  doc.text('Garantierte Std.:',20,y);doc.text((ev.days||0)*GH+'h',120,y);y+=7;
  if(ev.extra){doc.text('Überstunden:',20,y);doc.text('+'+ev.extra+'h',120,y);y+=7;}
  doc.setFont('helvetica','bold');doc.text('Gesamtstunden:',20,y);doc.setTextColor(180,130,50);doc.text(c.totalH+'h',120,y);y+=12;
  doc.setTextColor(60,60,60);doc.setFont('helvetica','bold');doc.text('Leistungen — 19% MwSt.',20,y);y+=8;doc.setFont('helvetica','normal');
  doc.text('Garantierte Vergütung:',20,y);doc.text(eur(c.guarPay),170,y,'right');y+=7;
  if(c.extraPay){doc.text('Überstunden:',20,y);doc.text(eur(c.extraPay),170,y,'right');y+=7;}
  doc.text('Verpflegungspauschale:',20,y);doc.text(eur(c.verpf),170,y,'right');y+=7;
  if(ev.anr){doc.text('Anreisepauschale:',20,y);doc.text(eur(ev.anr),170,y,'right');y+=7;}
  if(ev.abr){doc.text('Abreisepauschale:',20,y);doc.text(eur(ev.abr),170,y,'right');y+=7;}
  doc.setDrawColor(220,220,220);doc.line(20,y,190,y);y+=5;
  doc.text('Nettobetrag:',20,y);doc.text(eur(netto19),170,y,'right');y+=7;
  doc.text('zzgl. 19% MwSt.:',20,y);doc.text(eur(mwst),170,y,'right');y+=7;
  doc.setFont('helvetica','bold');doc.text('Bruttobetrag:',20,y);doc.setTextColor(180,130,50);doc.text(eur(brutto19),170,y,'right');y+=12;
  if(auslagen>0){
    doc.setTextColor(60,60,60);doc.setFont('helvetica','bold');doc.text('Auslagen — 0% MwSt. (steuerfrei)',20,y);y+=8;doc.setFont('helvetica','normal');
    myR.forEach(r=>{doc.text(r.desc+':',20,y);doc.text(eur(r.amt),170,y,'right');y+=7;});
    doc.setDrawColor(220,220,220);doc.line(20,y,190,y);y+=5;
    doc.setFont('helvetica','bold');doc.setTextColor(29,158,117);doc.text('Auslagen gesamt:',20,y);doc.text(eur(auslagen),170,y,'right');y+=10;
    doc.setFont('helvetica','italic');doc.setFontSize(9);doc.setTextColor(100,100,100);
    const lines=doc.splitTextToSize('"Hierbei handelt es sich um Auslagen gem. § 670 BGB, die im Auftrag und auf Rechnung des Auftraggebers verauslagt wurden. Diese Beträge werden ohne Umsatzsteuer weiterberechnet."',170);
    doc.text(lines,20,y);y+=lines.length*5+8;
  }
  doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(60,60,60);
  doc.setDrawColor(180,130,50);doc.line(20,y,190,y);y+=6;
  doc.text('Leistungen (brutto, 19%):',20,y);doc.text(eur(brutto19),170,y,'right');y+=7;
  if(auslagen>0){doc.text('Auslagen (0% MwSt.):',20,y);doc.text(eur(auslagen),170,y,'right');y+=7;}
  doc.setFontSize(13);doc.setTextColor(180,130,50);doc.text('Rechnungsbetrag:',20,y);doc.text(eur(total),170,y,'right');
  doc.setFontSize(9);doc.setTextColor(150,150,150);doc.setFont('helvetica','normal');
  doc.text('elbdrop MoveMents · info@elbdrop.com · Hamburg',20,285);
  doc.save('abrechnung_'+b.event.replace(/[^\w]/g,'_').toLowerCase()+'.pdf');
  toast('✓ PDF heruntergeladen');
}

// DRIVER — PROFILE
// ══════════════════════════════════════════
function renderProfile(){
  const pg=document.getElementById('pg-profile');
  pg.innerHTML=`
  <div class="sec" style="text-align:center;padding-top:20px">
    <div class="ava">${CU.ini}</div>
    <div style="font-size:15px;font-weight:500">${CU.name}</div>
    <div style="font-size:11px;color:var(--t3);margin-top:2px">${CU.email}</div>
  </div>
  <div class="sec" style="padding-top:0">
    <div class="stitle">Persönliche Daten</div>
    <div class="card">
      <div class="fg" style="margin-bottom:8px"><label class="fl">Anrede</label><select class="fsel" id="p-anrede"><option>Herr</option><option>Frau</option><option>Divers</option></select></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div class="fg"><label class="fl">Vorname</label><input class="fi" id="p-vn" placeholder="Vorname"></div>
        <div class="fg"><label class="fl">Nachname</label><input class="fi" id="p-nn" placeholder="Nachname"></div>
      </div>
      <div class="fg" style="margin-bottom:8px"><label class="fl">Geburtsdatum</label><input class="fi" type="date" id="p-birth"></div>
      <div class="fg" style="margin-bottom:8px"><label class="fl">Adresse</label><input class="fi" id="p-addr" placeholder="Straße & Hausnummer"></div>
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:8px;margin-bottom:8px">
        <div class="fg"><label class="fl">PLZ</label><input class="fi" id="p-plz" placeholder="20095"></div>
        <div class="fg"><label class="fl">Stadt</label><input class="fi" id="p-city" placeholder="Hamburg"></div>
      </div>
      <div class="fg" style="margin-bottom:8px"><label class="fl">Telefon</label><input class="fi" id="p-phone" placeholder="+49 40 ..."></div>
      <div class="fg" style="margin-bottom:8px"><label class="fl">E-Mail</label><input class="fi" id="p-email" value="${CU.email}" readonly></div>
      <div class="dvd"></div>
      <div class="fg" style="margin-bottom:8px"><label class="fl">Steuer-ID</label><input class="fi" id="p-tax" placeholder="12 345 678 901"></div>
      <div class="fg" style="margin-bottom:8px"><label class="fl">IBAN</label><input class="fi" id="p-iban" placeholder="DE89 3704 0044 ..."></div>
      <div class="dvd"></div>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:8px">
        <input type="checkbox" id="p-ps" style="accent-color:var(--gold);width:16px;height:16px" onchange="togglePs()">
        <span style="font-size:13px">P-Schein vorhanden</span>
      </label>
      <div id="p-ps-date" style="display:none;margin-bottom:8px"><div class="fg"><label class="fl">P-Schein gültig bis</label><input class="fi" type="date" id="p-ps-val"></div></div>
      <button class="btn btn-gold" onclick="toast('✓ Daten gespeichert')">Daten speichern</button>
    </div>
  </div>
  <div class="sec" style="padding-top:0">
    <div class="stitle">Dokumente hochladen</div>
    ${DOCS.map(d=>`<div class="upzone" onclick="trigDoc('${d.key}','${d.label}')">
      <div style="font-size:12px;font-weight:500;color:var(--t2)">${uploadedDocs[d.key]?'✓ '+uploadedDocs[d.key]:'📎 '+d.label}</div>
      <div style="font-size:10px;color:var(--t3);margin-top:2px">${uploadedDocs[d.key]?'Erneut hochladen':d.sub}</div>
    </div>`).join('')}
  </div>
  <div class="sec" style="padding-top:0">
    <div class="stitle">Verträge &amp; Vereinbarungen</div>
    ${localCons.map(c=>`<div class="card" style="margin-bottom:10px">
      <div class="crow">
        <div><div class="ct" style="font-size:13px">${c.title}</div><div class="cs">${c.signed?'Unterzeichnet am '+c.signedDate:'Unterschrift erforderlich'}</div></div>
        <span class="bdg ${c.signed?'b-done':'b-pend'}">${c.signed?'Signiert':'Offen'}</span>
      </div>
      <div style="display:flex;gap:7px;margin-top:10px">
        ${!c.signed?`<button class="btn btn-gold" style="flex:2;padding:9px" onclick="openCon(${c.id})">Lesen &amp; Unterzeichnen</button>`:`<div style="font-size:11px;color:var(--green);padding:6px 0">✓ Digital unterzeichnet</div>`}
        <button class="btn btn-outline" style="flex:1;padding:9px" onclick="dlConPDF(${c.id})">⬇ PDF</button>
      </div>
    </div>`).join('')}
  </div>`;
}
function togglePs(){document.getElementById('p-ps-date').style.display=document.getElementById('p-ps').checked?'block':'none';}
function trigDoc(key,label){
  const inp=document.createElement('input');inp.type='file';inp.accept='.pdf,.jpg,.jpeg,.png';
  inp.onchange=()=>{if(inp.files&&inp.files[0]){uploadedDocs[key]=inp.files[0].name;renderProfile();toast('✓ '+label+' hochgeladen');}};
  inp.click();
}
function openCon(id){
  activeCon=localCons.find(c=>c.id===id);if(!activeCon)return;
  document.getElementById('cmod-title').textContent=activeCon.title;
  document.getElementById('cmod-text').textContent=activeCon.text;
  document.getElementById('cagree').checked=false;
  openModal('mod-contract');
  setTimeout(initSig,80);
}
function initSig(){
  const cv=document.getElementById('sigcv'),pad=document.getElementById('sigpad');
  cv.width=pad.offsetWidth;cv.height=pad.offsetHeight;
  const ctx=cv.getContext('2d');ctx.strokeStyle='#c9a84c';ctx.lineWidth=2;ctx.lineCap='round';
  sigHas=false;document.getElementById('siglbl').style.display='flex';
  cv.onmousedown=e=>{sigDraw=true;sigLX=e.offsetX;sigLY=e.offsetY;document.getElementById('siglbl').style.display='none';};
  cv.onmousemove=e=>{if(!sigDraw)return;ctx.beginPath();ctx.moveTo(sigLX,sigLY);ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke();sigLX=e.offsetX;sigLY=e.offsetY;sigHas=true;};
  cv.onmouseup=()=>sigDraw=false;
  cv.ontouchstart=e=>{e.preventDefault();sigDraw=true;const t=e.touches[0],r=cv.getBoundingClientRect();sigLX=t.clientX-r.left;sigLY=t.clientY-r.top;document.getElementById('siglbl').style.display='none';};
  cv.ontouchmove=e=>{e.preventDefault();if(!sigDraw)return;const t=e.touches[0],r=cv.getBoundingClientRect();ctx.beginPath();ctx.moveTo(sigLX,sigLY);ctx.lineTo(t.clientX-r.left,t.clientY-r.top);ctx.stroke();sigLX=t.clientX-r.left;sigLY=t.clientY-r.top;sigHas=true;};
  cv.ontouchend=()=>sigDraw=false;
}
document.getElementById('sig-clear').onclick=()=>{const cv=document.getElementById('sigcv');cv.getContext('2d').clearRect(0,0,cv.width,cv.height);sigHas=false;document.getElementById('siglbl').style.display='flex';};
document.getElementById('csign').onclick=()=>{
  if(!document.getElementById('cagree').checked){toast('Bitte Zustimmung bestätigen');return;}
  if(!sigHas){toast('Bitte unterschreiben');return;}
  activeCon.signed=true;activeCon.signedDate=new Date().toLocaleDateString('de-DE');
  closeModal('mod-contract');renderProfile();toast('✓ Vertrag unterzeichnet · PDF gespeichert');
};
function genConPDF(c){
  const {jsPDF}=window.jspdf;const doc=new jsPDF();
  doc.setFont('helvetica','bold');doc.setFontSize(16);doc.setTextColor(201,168,76);doc.text('elbdrop MoveMents',20,20);
  doc.setFontSize(13);doc.setTextColor(30,30,30);doc.text(c.title,20,30);
  doc.setDrawColor(200,200,200);doc.line(20,34,190,34);
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(60,60,60);
  doc.text(doc.splitTextToSize(c.text,170),20,42);
  if(c.signed){
    const sy=doc.internal.pageSize.height-40;
    doc.setDrawColor(200,200,200);doc.line(20,sy,190,sy);
    doc.setFontSize(9);doc.setTextColor(100,100,100);
    doc.text('Digital unterzeichnet am: '+c.signedDate,20,sy+8);
    doc.text('Fahrer: '+CU.name+' ('+CU.email+')',20,sy+15);
    doc.setFont('helvetica','italic');doc.setTextColor(150,150,150);
    doc.text('Rechtsverbindliche digitale Signatur gemäß elbdrop MoveMents Plattform',20,sy+22);
  }
  return doc;
}
function dlConPDF(id){const c=localCons.find(x=>x.id===id);if(!c)return;genConPDF(c).save(c.title.replace(/[^\w]/g,'_').toLowerCase()+'.pdf');toast('✓ PDF heruntergeladen');}
</script>
